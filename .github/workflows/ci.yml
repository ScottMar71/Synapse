name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
  DIRECT_URL: postgresql://ci:ci@127.0.0.1:5432/ci

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Prisma client
        run: npm run prisma:generate --workspace=@conductor/database

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      # Fresh checkout each run; `apps/web/.next` is not cached between jobs.
      # Intermittent local MODULE_NOT_FOUND for numeric chunks under `.next/server` is a stale-cache issue — see AGENTS.md.
      - name: Build
        run: npm run build
